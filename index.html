<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Game</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen">
    <h1>Quiz Game</h1>
    <button onclick="startGame()">Start</button>
</div>

<!-- TOP BAR -->
<div class="topbar">
    <div>❤️ <span id="lives">3</span></div>

    <button onclick="openShop()">🛒 Shop</button>
    <button onclick="goToMap()">🗺 Map</button>

    <div>🪙 <span id="coins">0</span></div>
</div>

<!-- MAP -->
<div id="map" class="screen"></div>

<!-- GAME -->
<div id="game" class="screen">
    <div id="levelTitle"></div>

    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>

    <div id="progressText"></div>
    <div id="question"></div>
    <div id="answers"></div>
</div>

<!-- REWARD -->
<div id="reward" class="screen">
    <h2>Level Complete</h2>
    <p>You earned <span id="rewardCoins"></span> coins</p>
    <button onclick="doubleReward()">x2 Reward (Ad)</button>
    <button onclick="nextLevel()">Next Level</button>
</div>

<!-- CONTINUE -->
<div id="continueScreen" class="screen">
    <h2>Wrong answer</h2>
    <button onclick="watchAd()">📺 Continue (Ad)</button>
    <button onclick="loseLife()">❌ Lose Life</button>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
    <h2>Shop</h2>

    <button onclick="buyRemoveTwo()">Удалить 2 ответа (120)</button>
    <button onclick="buySkip()">Пропустить вопрос (100)</button>
    <button onclick="buyHint()">Показать ответ (200)</button>

    <br><br>
    <button onclick="goToMap()">⬅ Назад</button>
</div>

<script src="engine/screenManager.js"></script>
<script src="engine/saveSystem.js"></script>
<script src="engine/livesSystem.js"></script>
<script src="engine/economySystem.js"></script>

<script src="game/questions.js"></script>
<script src="game/levels.js"></script>
<script src="game/gameplay.js"></script>

</body>
                    </html>
